name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy only changed functions
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^supabase/functions/' | awk -F'/' '{print $3}' | sort -u)
          if [ -z "$CHANGED" ]; then
            echo "No function changes detected."
            exit 0
          fi
          for fn in $CHANGED; do
            if [ -d "supabase/functions/$fn" ]; then
              echo "→ Deploying: $fn"
              supabase functions deploy "$fn" --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
